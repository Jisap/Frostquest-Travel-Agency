[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

# Esto es vital para que el enrutado de React (React Router) funcione
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200